# 1. Configuração de Conexão com o Repositório (Decap CMS Core)
backend:
  name: github
  repo: kabbalahh/sovereignsolo-ai
  branch: main
  base_url: https://netlify-cms-oauth-sovereign.vercel.app

# 2. Roteamento de Mídias e Uploads
media_folder: "assets/images"
public_folder: "/assets/images"

# 3. Mapeamento das Coleções Administrativas
collections:
  # --- MÓDULO DE INBOUND (BLOG) ---
  - name: "posts"
    label: "Artigos (Blog de Tráfego)"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "post"}
      - {label: "Título", name: "title", widget: "string"}
      - {label: "Descrição SEO", name: "description", widget: "text"}
      - {label: "Data de Publicação", name: "date", widget: "datetime"}
      - {label: "Corpo do Artigo", name: "body", widget: "markdown"}

  # --- MÓDULO COMERCIAL (PRODUTOS / EBOOKS) ---
  - name: "products"
    label: "Matriz de Produtos (Ebooks)"
    folder: "_products"
    create: true
    identifier_field: "id"
    slug: "{{slug}}"
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "product"}
      - {label: "ID de Sistema (ex: tiktok-shop)", name: "id", widget: "string"}
      - {label: "Título do Produto", name: "title", widget: "string"}
      - {label: "Tagline (Promessa)", name: "tagline", widget: "string"}
      
      # --- CAMPOS DE PREÇO COM GATILHO DE ANCORAGEM ---
      - {label: "Preço Original Riscado (ex: 97,00)", name: "price_original", widget: "string", required: false}
      - {label: "Preço Promocional Atual (ex: 47,00)", name: "price", widget: "string"}
      
      - {label: "Badge (ex: Produto Novo)", name: "badge", widget: "string", required: false}
      - {label: "Imagem de Capa", name: "cover_image", widget: "image"}
      - {label: "Link Hotmart", name: "hotmart_url", widget: "string"}
      
      # --- PROVA SOCIAL ANCHOR ---
      - {label: "Nota de Avaliação (ex: 4.9)", name: "rating_score", widget: "string", required: false, default: "4.9"}
      - {label: "Total de Avaliações (ex: 156)", name: "rating_count", widget: "string", required: false, default: "156"}
      
      # --- GATILHOS DE ESCASSEZ E URGÊNCIA ---
      - {label: "Vagas Restantes Lote", name: "slots_limit", widget: "number", default: 5}
      - {label: "Duração do Timer (Minutos)", name: "timer_duration", widget: "number", default: 15}
      
      # --- GANHOS PRÁTICOS (Lista Simples) ---
      - label: "Bullet Points de Ganho Prático"
        name: "gains"
        widget: "list"
        required: false
        field: {label: "Benefício Real", name: "item", widget: "string"}
        
      # --- FILTRO DE QUALIFICAÇÃO ---
      - label: "Para Quem É (Critérios Positivos)"
        name: "for_who"
        widget: "list"
        required: false
        field: {label: "Público Alvo", name: "item", widget: "string"}
        
      - label: "Para Quem Não É (Critérios Negativos)"
        name: "not_for_who"
        widget: "list"
        required: false
        field: {label: "Público Não Desejado", name: "item", widget: "string"}

      - {label: "Estrutura Detalhada / Copy", name: "body", widget: "markdown"}