# 1. Configuração do Repositório
backend:
  name: github
  repo: kabbalahh/sovereignsolo-ai
  branch: main
  base_url: https://netlify-cms-oauth-sovereign.vercel.app

# 2. Roteamento de Mídias
media_folder: "assets/images"
public_folder: "/assets/images"

# 3. Mapeamento de Banco de Dados (Collections)
collections:
  # --- MÓDULO DE INBOUND (BLOG) ---
  - name: "posts"
    label: "Artigos (Blog de Tráfego)"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "post"}
      - {label: "Título", name: "title", widget: "string"}
      - {label: "Descrição SEO", name: "description", widget: "text"}
      - {label: "Data de Publicação", name: "date", widget: "datetime"}
      - {label: "Corpo do Artigo", name: "body", widget: "markdown"}

  # --- MÓDULO COMERCIAL (PRODUTOS) ---
  - name: "products"
    label: "Matriz de Produtos (Ebooks)"
    folder: "_products"
    create: true
    identifier_field: "id"
    slug: "{{slug}}"
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "product"}
      - {label: "ID de Sistema (ex: ebook-express)", name: "id", widget: "string"}
      - {label: "Título do Produto", name: "title", widget: "string"}
      - {label: "Tagline (Promessa)", name: "tagline", widget: "string"}
      - {label: "Preço (ex: 47,00)", name: "price", widget: "string"}
      - {label: "Badge (ex: Mais Vendido)", name: "badge", widget: "string", required: false}
      - {label: "Imagem de Capa", name: "cover_image", widget: "image"}
      - {label: "Link Hotmart", name: "hotmart_url", widget: "string"}
      
      # --- IMPLEMENTAÇÃO: PROVA SOCIAL ANCHOR ---
      - {label: "Nota de Avaliação (ex: 4.9)", name: "rating_score", widget: "string", required: false, default: "4.9"}
      - {label: "Total de Avaliações (ex: 128)", name: "rating_count", widget: "string", required: false, default: "128"}
      
      # --- IMPLEMENTAÇÃO: GANHOS PRÁTICOS (Sintaxe Sanitizada em Bloco) ---
      - label: "Bullet Points de Ganho Prático"
        name: "gains"
        widget: "list"
        required: false
        field:
          label: "Benefício Focado no Resultado"
          name: "item"
          widget: "string"
        
      # --- IMPLEMENTAÇÃO: FILTRO DE QUALIFICAÇÃO (Sintaxe Sanitizada em Bloco) ---
      - label: "Para Quem É (Critérios Positivos)"
        name: "for_who"
        widget: "list"
        required: false
        field:
          label: "Público Alvo Ideal"
          name: "item"
          widget: "string"
          
      - label: "Para Quem Não É (Critérios Negativos)"
        name: "not_for_who"
        widget: "list"
        required: false
        field:
          label: "Público Não Desejado"
          name: "item"
          widget: "string"

      - {label: "Estrutura Detalhada / Copy", name: "body", widget: "markdown"}