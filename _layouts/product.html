---
layout: default
---
<section class="hero-frame" style="padding: 4rem 2rem 2rem 2rem; border-bottom: 1px solid rgba(255, 255, 255, 0.02);">
    <div style="max-width: 800px; margin: 0 auto; text-align: center;">
        {% if page.badge %}
        <span class="card-badge" style="position: static; display: inline-block; margin-bottom: 1.5rem;">
            {{ page.badge }}
        </span>
        {% endif %}

        <h1 class="hero-main-title" style="font-size: 2.8rem; line-height: 1.2; margin-bottom: 1rem;">
            {{ page.title }}
        </h1>

        <p style="color: var(--text-muted); font-size: 1.2rem; max-width: 650px; margin: 0 auto 2.5rem auto; line-height: 1.6;">
            {{ page.tagline }}
        </p>
        
        {% if page.cover_image %}
        <div style="text-align: center; margin-top: 1rem;">
            <img src="{{ page.cover_image | relative_url }}" alt="{{ page.title }}" style="max-width: 100%; height: auto; max-height: 400px; border-radius: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); border: 1px solid rgba(0, 242, 254, 0.15);">
        </div>
        {% endif %}
    </div>
</section>

<main style="max-width: 800px; margin: 3rem auto; padding: 0 2rem;">
    <article>
        <div class="product-marketing-body" style="line-height: 1.8; color: var(--text-pure); font-size: 1.1rem;">
            {{ content }}
        </div>

        <div style="margin-top: 4rem; padding: 2.5rem; background: var(--bg-surface); border-radius: 16px; text-align: center; border: 1px solid rgba(0, 242, 254, 0.2);">
            <div style="font-size: 2.2rem; font-weight: 800; color: var(--text-pure); margin-bottom: 1rem;">
                <span style="font-size: 1.2rem; color: var(--text-muted); font-weight: 400;">R$</span> {{ page.price }}
            </div>
            <a href="{{ page.hotmart_url }}" target="_blank" rel="noopener noreferrer" class="btn-cta" data-product-id="{{ page.id }}" data-product-title="{{ page.title }}" style="display: inline-block; max-width: 300px; margin-top: 0;">
                Adquirir Acesso Imediato
            </a>
        </div>
    </article>
</main>
