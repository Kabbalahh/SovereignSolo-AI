---
layout: default
---
<main style="max-width: 800px; margin: 4rem auto; padding: 0 2rem;">
    <article>
        <header style="margin-bottom: 3rem; text-align: center;">
            <span style="color: var(--quantum-cyan); font-weight: 600; text-transform: uppercase; font-size: 0.85rem;">{{ page.badge }}</span>
            <h1 style="font-size: 2.5rem; font-weight: 800; margin-top: 0.5rem; line-height: 1.2;">{{ page.title }}</h1>
            <p style="color: var(--text-muted); font-size: 1.2rem; margin-top: 1rem;">{{ page.tagline }}</p>
        </header>

        <div class="product-marketing-body" style="line-height: 1.8; color: var(--text-pure); font-size: 1.1rem;">
            {{ content }}
        </div>

        <div style="margin-top: 4rem; padding: 2.5rem; background: var(--bg-surface); border-radius: 16px; text-align: center; border: 1px solid rgba(0, 242, 254, 0.2);">
            <div style="font-size: 2.2rem; font-weight: 800; color: var(--text-pure); margin-bottom: 1rem;">
                <span style="font-size: 1.2rem; color: var(--text-muted); font-weight: 400;">R$</span> {{ page.price }}
            </div>
            <a href="{{ page.hotmart_url }}" target="_blank" rel="noopener noreferrer" class="btn-cta" style="display: inline-block; max-width: 300px;">Adquirir Acesso Imediato</a>
        </div>
    </article>
</main>
