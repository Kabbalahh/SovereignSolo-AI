---
layout: default
---
<main style="max-width: 800px; margin: 4rem auto; padding: 0 2rem;">
    <article>
        <header style="margin-bottom: 3rem; text-align: center;">
            <span style="color: var(--quantum-cyan); font-weight: 600; text-transform: uppercase; font-size: 0.85rem;">{{ page.badge }}</span>
            <h1 style="font-size: 2.5rem; font-weight: 800; margin-top: 0.5rem; line-height: 1.2;">{{ page.title }}</h1>
            <p style="color: var(--text-muted); font-size: 1.2rem; margin-top: 1rem;">{{ page.tagline }}</p>
        </header>

        <h1 class="product-title">{{ page.title }}</h1>
        <div class="product-price">R$ {{ page.price }}</div>
        <a href="{{ page.hotmart_url }}" class="btn-cta">Adquirir Acesso Imediato</a>
        <div class="product-body">
            {{ content }}
        </div>
    </article>
</main>
